module: banking/query-customer-accounts
description: >
  Queries all accounts for the authenticated customer. Auth check first, then
  calls the Account Search API, then formats a human-readable numbered list.

# ─── Input ────────────────────────────────────────────────────────────────────
inputs: none  # all variables are resolved internally from context

# ─── Output ───────────────────────────────────────────────────────────────────
outputs:
  account_list:
    context_var: account_list
    description: "Array of account objects. Fields: id, type, nickname, accountNumber, balance, availableBalance, currency, accountAccess."
  account_number_list:
    context_var: account_number_list
    description: "Numbered list for TTS, e.g. \"1. Checking ending in 4427\"."
  account_total_count:
    context_var: account_total_count
    description: "0 = no accounts, 1 = auto-select, >1 = ask customer."
  skill_execution_result:
    context_var: skill_execution_result
    description: "{ skill_name, skill_result: success|error|warning, skill_message }"

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  name: Account Search
  input: "{ uid }"
  output: "{ total, accounts[] }"

# ─── Internal context vars (resolved inside workflow) ─────────────────────────
internal:
  id_authenticated_user: resolved via getCustomerId() at runtime
  authentication_status: read from context; if false, workflow exits with error

# ─── Logic ────────────────────────────────────────────────────────────────────
logic:
  - step: 1
    name: auth-gate
    description: If authentication_status is false, set skill_result "error" and stop.
  - step: 2
    name: resolve-uid
    description: "Call getCustomerId(): private_detail_object.active_id → Application Input.Uid → Uid."
  - step: 3
    name: call-api
    description: POST Account Search with { uid }, store accounts array as account_list.
  - step: 4
    name: format-and-set
    description: Set account_number_list and account_total_count. 0 accounts → warning, else success.

# ─── JS functions ─────────────────────────────────────────────────────────────
js_functions:
  getCustomerId: |
    function getCustomerId() {
      const privateDetail = Context.getVariable("private_detail_object");
      if (privateDetail && privateDetail.active_id) return privateDetail.active_id;
      const appInputUid = Context.getVariable("Application Input.Uid");
      if (appInputUid) return appInputUid;
      return Context.getVariable("Uid");
    }

  formatAccountList: |
    function formatAccountList(accounts) {
      return accounts.map((acct, i) =>
        `${i + 1}. ${acct.type} ending in ${acct.accountNumber.slice(-4)}`
      ).join("\n");
    }

  set_outputs: |
    const accounts = Context.getVariable("account_list") || [];
    Context.setVariable("account_number_list", formatAccountList(accounts));
    Context.setVariable("account_total_count", accounts.length);
    const result = accounts.length === 0
      ? { skill_name: "query_customer_accounts", skill_result: "warning", skill_message: "No accounts found." }
      : { skill_name: "query_customer_accounts", skill_result: "success", skill_message: `${accounts.length} account(s) found.` };
    Context.setVariable("skill_execution_result", result);
