tool: gather_summary
description: >
  Checks whether a conversation_summary has been set in context.
  Returns success if it exists, error if it is empty or missing.

# ─── Input ────────────────────────────────────────────────────────────────────
inputs:
  conversation_summary:
    source: context_var
    required: true
    description: The conversation summary written by the Coordinator before escalation.

# ─── Output ───────────────────────────────────────────────────────────────────
outputs:
  skill_execution_result:
    context_var: skill_execution_result
    description: "{ skill_name, skill_result: success|error, skill_message }"
  conversation_summary:
    context_var: conversation_summary
    description: Passed through unchanged.

# ─── Workflow logic ───────────────────────────────────────────────────────────
logic:
  - step: 1
    name: Check Summary
    description: >
      Read conversation_summary from context.
      If non-empty → skill_result: "success", skill_message: "Escalate directly to the live agent".
      If empty or missing → skill_result: "error", skill_message: "Please provide a summary of the conversation history".

# ─── JS function ──────────────────────────────────────────────────────────────
js_function: |
  var conversation_summary = Context.getVariable("conversation_summary");

  var skill_execution_result;

  if (conversation_summary && conversation_summary.trim() !== "") {
      skill_execution_result = {
          skill_name: "gather_summary",
          skill_result: "success",
          skill_message: "Escalate directly to the live agent"
      };
  } else {
      skill_execution_result = {
          skill_name: "gather_summary",
          skill_result: "error",
          skill_message: "Please provide a summary of the conversation history"
      };
  }

  Context.setVariable("skill_execution_result", skill_execution_result);
