    - id: _mNK9lMkY4hyDKlHLainG
      data:
        code: |-
          const paymentCount = Context.getVariable("payment_total_count");
          if (paymentCount > 0) {
              const paymentList = Context.getVariable("payment_list").payments;
              const payment = paymentList[0];
              Context.setVariable('upcoming_payment', payment)

              const account_number = Context.getVariable("account_number");
              const account_type = Context.getVariable("account_type");
              const loan_account_type = ['MORTGAGE_LOAN', 'HOME_EQUITY_LOAN', 'AUTO_LOAN', 'PERSONAL_LOAN', 'BUSINESS_LOAN', 'STUDENT_LOAN'];
              const credit_account_type = ['CREDIT_CARD', 'CREDIT', 'BUSINESS_CREDIT_CARD', 'STUDENT_CREDIT_CARD', 'PERSONAL_CREDIT_CARD'];


              let upcoming_payment_information = "";
              let upcoming_payment_details = "";
              if (loan_account_type.indexOf(account_type) > -1) {
                  upcoming_payment_information = "Your " + account_type + " account " + account_number.slice(-4) + " has an upcoming payment of " + payment.total_amount_due + " dollars due on " + payment.due_at + ". Do you want to know the amount breakdown?";
                  upcoming_payment_details = "Sure, then your principal balance is " + payment.amount_details.principal_payment + " dollars, your Interest due are  " + payment.amount_details.interest_payment + " dollars, your monthly escrow payment is " + payment.amount_details.monthly_escrow_payment
              + " dollars and your loan fees are " + payment.amount_details.fee + " dollars.";
              } else if (credit_account_type.indexOf(account_type) > -1) {
                  const total_upcoming_amount = (Number(payment.total_amount_due) || 0) + (Number(payment.due_fees_amount) || 0);

                  const accountList = Context.getVariable("account_list").accounts;
                  const account = accountList.find(acc => acc.account_number === account_number);
                  const last_state_date = account.last_statement_date;
                  const statement_balance = account.statement_balance;
                  const next_closing_date = account.next_closing_date;

                  upcoming_payment_information = "Your " + account_type + " account " + account_number.slice(-4) + " has an upcoming payment of " + total_upcoming_amount + " dollars due on " + payment.due_at + ". Do you want to know more information about your upcoming payment?";
                  upcoming_payment_details = "Sure, then your Last statement balance paid " + last_state_date + " was " + statement_balance + " dollars, your minimum payment due is " + payment.minimum_payment_due + " dollars and the next closing date is on " + next_closing_date + ".";
              }

              Context.setVariable('upcoming_payment_information', upcoming_payment_information)
              Context.setVariable('upcoming_payment_details', upcoming_payment_details)
          }
        name: Get upcoming payment details
