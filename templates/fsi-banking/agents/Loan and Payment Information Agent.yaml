- tool_id: 2ac7991f-89cb-426a-ae63-5ed98c074f0a
  tool_name: Get Loan Information
  tool_description: Get Account Loan Information
  execute_params:
    connection_id: ''
    action_id: ''
    nodes:
    - id: klgST64gGhZ2PTuQ0-zb7
      data:
        name: Get Loan Information
        variables:
        - type: string
          variable: 49690105-5d33-49ba-b1ef-d6dbb60e6fdf
        more_details: Get Account Loan Information
      type: start-flow
      position:
        x: 0
        y: 0
    - id: X3ictUGfBhrEJnlKFdNpv
      data:
        code: |-
          function fillDefault(input, defaultValue) {
              if (input === null || input === undefined || input === "") {
                  return defaultValue;
              }
              return input;
          }

          function getAccountLoanInformation(selectedAccountNumber) {
              const accountList = Context.getVariable("account_list").accounts;
              const last4 = String(selectedAccountNumber).slice(-4);
              const account = accountList.find(acc => acc.account_number.endsWith(last4));
              if (!account) return null;

              Context.setVariable("account_id", account.id);
              Context.setVariable("account_number", account.account_number);
              Context.setVariable("account_type", account.account_type);
              Context.setVariable("account_balance", account.balance);
              Context.setVariable("account_available_balance", account.available_balance);

              const loanInformationMessage =
              `Your loan account ending in ${account.account_number.slice(-4)} has a contract amount of ${account.loan_amount} dollars
              and a ${account.interest_details.interest_rate}% ${account.interest_details.interest_rate_type} interest rate.
              The loan started on ${account.loan_start_date}, has a term of ${account.term} years,
              and will mature on ${account.maturity_date}.
              The current principal balance is ${account.available_balance} dollars.
              Do you want to know the last interest and taxes paid related to this loan?`;

              Context.setVariable("account_loan_information", loanInformationMessage);

              const lastInterestInformation = `The last interest paid as of ${account.interest_details.last_interest_paid_date} was $${account.interest_details.last_interest_paid},
              the YTD interest paid was $${account.interest_details.ytd_interest_paid}, the previous year interest paid was $${account.interest_details.previous_year_interest_paid}
              and the previous year tax amount paid was $${account.previous_year_taxes_paid}.`

              Context.setVariable("account_last_interest", lastInterestInformation);
          }

          const selectedAccountNumber = Context.getVariable("selected_account_number");
          getAccountLoanInformation(selectedAccountNumber);
        name: Get Loan Information details
      type: function
      position:
        x: 301.5
        y: -19.1171875
