    - id: BpPcA9zr2EhUs13LW2C0v
      data:
        code: |-
          function getMonthlyLoanPaymentInformation(selectedAccountNumber) {
              const accountList = Context.getVariable("account_list").accounts;
              const last4 = String(selectedAccountNumber).slice(-4);
              const account = accountList.find(acc => acc.account_number.endsWith(last4));
              if (!account) return null;

              Context.setVariable("account_id", account.id);
              Context.setVariable("account_number", account.account_number);
              Context.setVariable("account_type", account.account_type);
              // Context.setVariable("account_balance", account.balance);
              // Context.setVariable("account_available_balance", account.available_balance);

              const automaticPayment = account.automatic_payment
              const monthlyLoanPaymentDetails = account.monthly_loan_payment_details;
              let account_mlp_information = "";
              let account_mlp_breakdown = "";
              if (automaticPayment === true) {
                  account_mlp_information = `Thanks. Your monthly loan payment is $${monthlyLoanPaymentDetails.monthly_loan_payment}, paid automatically on ${account.automatic_payment_date}. Do you want a breakdown of this amount?`
              } else if (automaticPayment === false) {
                  account_mlp_information = `Thanks. Your monthly loan payment is $${monthlyLoanPaymentDetails.monthly_loan_payment}. Do you want a breakdown of this amount?`
              }
              Context.setVariable("account_mlp_information", account_mlp_information);

              account_mlp_breakdown = `your principal balance is $${monthlyLoanPaymentDetails.principal_payment}, your interest due is $${monthlyLoanPaymentDetails.interest_payment}, your monthly escrow payment is $${monthlyLoanPaymentDetails.monthly_escrow_payment}, and your loan fees are $${monthlyLoanPaymentDetails.fee}.`

              Context.setVariable("account_mlp_breakdown", account_mlp_breakdown);
          }

          const selectedAccountNumber = Context.getVariable("selected_account_number");
          getMonthlyLoanPaymentInformation(selectedAccountNumber);
        name: Get MLP
      type: function
      position:
        x: 320.63132988200954
        y: -25.56568822145008
