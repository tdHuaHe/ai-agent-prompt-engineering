    - id: _rilMjMY4_ILLnttZhQ7r
      data:
        code: |-
          const account_number = Context.getVariable("account_number").slice(-4);
          const payoff_date = Context.getVariable("payoff_date");
          const payoff_amount = Context.getVariable("payoff_amount");

          if (!payoff_amount || payoff_amount === "0.00") {
              const payoff_amount_information = `Thanks. Your payoff amount for the loan account ending in ${account_number} and quoted for ${payoff_date} is ${payoff_amount} dollars.`;
              Context.setVariable("payoff_amount_information", payoff_amount_information);
              Context.setVariable("payoff_breakdown_information", "No breakdown available since the payoff amount is zero.");
          } else {
              const daily_per_diem = Context.getVariable("daily_per_diem") || "0.00";
              const payoff_amount_details = Context.getVariable("payoff_amount_details") || {};

              const payoff_amount_information = `Thanks. Your payoff amount for the loan account ending in ${account_number} and quoted for ${payoff_date} is ${payoff_amount} dollars. Would you like me to provide a breakdown of this amount?`;
              Context.setVariable("payoff_amount_information", payoff_amount_information);

              const payoff_breakdown_information = `Your unpaid principal balance is ${payoff_amount_details.principal_payment || "0.00"} dollars, your interests due is ${payoff_amount_details.interest_payment || "0.00"} dollars, your daily per diem is ${daily_per_diem} dollars, your monthly escrow payment is ${payoff_amount_details.monthly_escrow_payment || "0.00"} dollars, and your loan fees are ${payoff_amount_details.fee || "0.00"} dollars.`;
              Context.setVariable("payoff_breakdown_information", payoff_breakdown_information);
          }
        name: get payoff quotation details
      type: function
      position:
        x: 718.6399222886143
        y: -150.71128144506406
