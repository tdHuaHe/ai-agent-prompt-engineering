          \ {\n\t\t\tContext.setVariable(\"postal_code_found\", false);\n\t\t}\n\t\
          \tif (contactAddress.district) {\n\t\t\taddress += ` ${contactAddress.district}`;\n\
          \t\t}\n\t}\n\n\tif (contactAddress.country) {\n\t\taddress += `${separator}\
          \ ${contactAddress.country}`;\n\t}\n\n\tif (address.startsWith(separator))\
