    - id: 10y0svVbH3INlF-R6VZQk
      data:
        code: |-
          function setSlotDetails(slotId) {
              const availalbeSlotsJson = Context.getVariable("available_provider_slots_list")
              let slotList = null
              if (availalbeSlotsJson?.provider_slots?.length > 0) {
                  slotList = availalbeSlotsJson.provider_slots
              }else{
                  slotList = availalbeSlotsJson
              }
              const slot = slotList.find(slot => slot.id == slotId);

              if (!slot) return null;

              // Context.setVariable("slot_id", slot.id)
              Context.setVariable("duration", slot.duration)
              Context.setVariable("start_date_UTC", slot.start_date)
          }
          Context.setVariable("workflow_status", "success")
          const slotId = Context.getVariable("slot_id")
          setSlotDetails(slotId)
        name: set slot id
      type: function
