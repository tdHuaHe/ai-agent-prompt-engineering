    - id: 9pedw4-ZSHNNpmLF6OCZx
      data:
        code: |-
          /**
           * Check if location is valid by name or address
           * @param {string} locationName - The name of the location to check
           * @param {string} locationAddress - The address of the location to check
           * @returns {boolean} - true if location is valid, false otherwise
           */
          function validateLocationAddress(locationName, locationAddress) {
            const locationList = [
              "Rancho Bernardo",
              "El Cajon",
              "Fletcher Parkway",
              "Center Drive",
              "Aero Drive",
              "8010 Frost St.",
              "Genesee Ave",
              "765 Medical Center Court",
              // "Chula Vista",
              "Point Loma",
              "Sharp Coronado Hospital"
              ];

             // Check if location name exists in the list
              if (locationList.includes(locationName)) {
                  Context.setVariable("location_address", null)
              } else if (locationAddress && locationAddress.trim() !== "") {
                  // If name not found, check if address is not empty
                Context.setVariable("location_name", null)
                  //everytime the caller says chula vista, we need to understand what is the right one - because we have two
                  if (locationName.toLowerCase().includes("chula vista")) {
                      Context.setVariable("location_address", "Chula Vista")
                  }
              } else if (!locationAddress) {
                  Context.setVariable("location_name", null)
                  Context.setVariable("location_address", locationName)

              }
          }

          const location_name = Context.getVariable("location_name")
          const location_address = Context.getVariable("location_address")

          validateLocationAddress(location_name, location_address)
        name: Validate location address
      type: function
      position:
        x: -935.8918072190842
        y: -85.99271088996423
    - id: xtXOwqqcfWPZYQLTQ_BHL
      data:
        code: |-
          const locations = Context.getVariable("locations_list")

          if (!locations || !locations.locations || locations.locations.length === 0) {
              Context.setVariable("location_found", "No");
          } else {
              Context.setVariable("location_found", "Yes");
          }
        name: check. if location is found
      type: function
      position:
        x: -358.6703310568025
        y: -425.90731925345517
