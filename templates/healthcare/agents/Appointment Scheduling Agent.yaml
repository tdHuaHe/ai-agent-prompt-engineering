    - id: K-BMBp5JLijnaKSgJQ6uP
      data:
        code: |-
          let locationProviderMap = new Map([
            ["101003056", "24091"],
            ["101003055", "24090"],
            ["10100708", "20342"],
            ["101010230", "24095"],
            ["10101256", "11724080"],
            ["101010231", "24093"],
            ["101002156", "40884"],
            ["101002047", "24096"],
            ["101002048", "24097"],
            ["101002050", "24098"],
            ["10100744", "24089"],
          ]);

          Context.setVariable("workflow_status", "success")

          let start_date = Context.getVariable("start_date");
          let original_start_date = start_date
          const weekday = Context.getVariable("preferred_weekday");
          const adjustedDate = adjustDateToWeekday(start_date, weekday)
          start_date = adjustedDate.adjustedDate
          const date_matched_weekday = adjustedDate.date_matched_weekday
          Context.setVariable("start_date", start_date)
          const localeDate = formatDateWithOrdinal(start_date)

          if(date_matched_weekday === "No"){
              Context.setVariable("workflow_status", `The date for ${weekday} should be ${localeDate}. So the correct match is:  on ${weekday}, ${localeDate}`)
          }

          const preferred_time = Context.getVariable("preferred_time")
          if (!preferred_time || preferred_time === "") {
              Context.setVariable("preferred_time", null)
          } else {
              if (preferred_time.indexOf("AM") < 0 && preferred_time.indexOf("PM")< 0){
              Context.setVariable("preferred_time", null)
              }
          }

          const max_days_input = Context.getVariable("max_days");
          const normalized_max_days = normalizeMaxDays(max_days_input);
          Context.setVariable("max_days", normalized_max_days);

          const visit_type_name = Context.getVariable("visit_type_name")
          const location_name = Context.getVariable("location_name")
          storeAppointmentDetails(visit_type_name, location_name)

          function storeAppointmentDetails(visit_type_name, location_name) {
              if(visit_type_name.toLowerCase().indexOf("lab")>-1){
                  Context.setVariable("service_type_id", "11700")
              }else{
                  Context.setVariable("service_type_id", "2721")
              }
              const externalId = Context.getVariable("external_id_location")
              Context.setVariable("location_id", externalId)

              let providerID = locationProviderMap.get(externalId);
              Context.setVariable("provider_id", providerID);
          }

          /**
           * Adjust start_date to match the preferred weekday
           * @param {string} startDate - The starting date (YYYY-MM-DD format)
           * @param {string} weekday - The preferred weekday (e.g., 'monday', 'tue')
           * @returns {object} Object with adjustedDate and matchedWeekday flag
           */
          function adjustDateToWeekday(startDate, weekday) {
              let adjustedDate = startDate;
              let date_matched_weekday = "Yes"

              if (adjustedDate === null || adjustedDate === "") {
                  adjustedDate = new Date().toISOString().split('T')[0];
              }

              // Adjust date to match preferred weekday if provided
              if (weekday && weekday !== "" && weekday !== null) {
                  const targetDate = new Date(adjustedDate);
                  const weekdayMap = {
                      'sunday': 0, 'sun': 0,
                      'monday': 1, 'mon': 1,
                      'tuesday': 2, 'tue': 2,
                      'wednesday': 3, 'wed': 3,
                      'thursday': 4, 'thu': 4,
                      'friday': 5, 'fri': 5,
                      'saturday': 6, 'sat': 6
                  };

                  const targetWeekday = weekdayMap[weekday.toLowerCase()];

                  if (targetWeekday !== undefined) {
                      const currentWeekday = targetDate.getDay();

                      // If current day doesn't match preferred weekday, find next occurrence
                      if (currentWeekday !== targetWeekday) {
                          date_matched_weekday = "No"
                          original_start_date = adjustedDate
                          let daysToAdd = targetWeekday - currentWeekday;

                          // Find the closest occurrence (could be previous or next week)
                          // If difference is more than 3 days, go to the other direction
                          if (daysToAdd > 3) {
                              daysToAdd -= 7; // Go to previous week instead
                          } else if (daysToAdd < -3) {
                              daysToAdd += 7; // Go to next week instead
                          }
                          targetDate.setDate(targetDate.getDate() + daysToAdd);
                          adjustedDate = targetDate.toISOString().split('T')[0];
                      }
                  }
              }

              return { adjustedDate, date_matched_weekday };
          }

          function formatDateWithOrdinal(isoDate, locale = 'en-US') {
            const d = new Date(isoDate);
            if (Number.isNaN(d.getTime())) throw new Error('Invalid date string');

            const month = d.toLocaleString(locale, { month: 'long' });
            const day = d.getDate();

            // Ordinal suffix rules
            const suffix = (n => {
              const rem100 = n % 100;
              if (rem100 >= 11 && rem100 <= 13) return 'th';
              switch (n % 10) {
                case 1: return 'st';
                case 2: return 'nd';
                case 3: return 'rd';
                default: return 'th';
              }
            })(day);

            return `${month} ${day}${suffix}`;
          }

          /**
           * Convert max_days to integer and ensure it doesn't exceed 30
           * @param {any} maxDays - The max days value (can be string, number, or any type)
           * @returns {number} Integer value capped at 30
           */
          function normalizeMaxDays(maxDays) {
              let days;

              // If it's a string, try to extract digits first
              if (typeof maxDays === 'string') {
                  // Extract first number from string (e.g., "3 days" → "3")
                  const match = maxDays.match(/\d+/);
                  if (match) {
                      days = parseInt(match[0]);
                  } else {
                      days = NaN; // No digits found
                  }
              } else {
                  // Convert to integer directly
                  days = parseInt(maxDays);
              }

              // Handle invalid values (NaN, null, undefined, etc.)
              if (isNaN(days) || days < 0) {
                  days = 30; // Default to 30 if invalid
              }

              // Cap at 30 days maximum
              if (days > 30) {
                  days = 30;
              }

              return days;
          }
        name: prepare parameters
      type: function
