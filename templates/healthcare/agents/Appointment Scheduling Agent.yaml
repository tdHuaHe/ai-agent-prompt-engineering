    - id: Rk2Hh73D6If9BC13rJe8d
      data:
        code: |-
          const locations = Context.getVariable("locations_list")


              const openHoursMap = {
            "Rancho Bernardo": { BUSINESS_DAYS: "07:00AM-04:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "El Cajon": { BUSINESS_DAYS: "07:00AM-02:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "Fletcher Parkway": { BUSINESS_DAYS: "07:00AM-05:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "Center Drive": { BUSINESS_DAYS: "06:00AM-06:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "Aero Drive": { BUSINESS_DAYS: "08:00AM-05:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "8010 Frost St.": { BUSINESS_DAYS: "07:00AM-05:00PM", WEEKEND_SAT: "07:00AM-12:00PM", WEEKEND_SUN: "" },
            "Genesee Ave": { BUSINESS_DAYS: "07:00AM-12:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "765 Medical Center Court": { BUSINESS_DAYS: "06:00AM-06:00PM", WEEKEND_SAT: "06:00AM-03:00PM", WEEKEND_SUN: "07:00AM-12:00PM" },
            "Chula Vista": { BUSINESS_DAYS: "07:00AM-04:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "Point Loma": { BUSINESS_DAYS: "08:00AM-12:00PM|01:00PM-05:00PM", WEEKEND_SAT: "", WEEKEND_SUN: "" },
            "Sharp Coronado Hospital": { BUSINESS_DAYS: "06:00AM-06:00PM", WEEKEND_SAT: "07:00AM-03:00PM", WEEKEND_SUN: "07:00AM-12:00PM" }
          };

          const extractedLocations = locations.locations.map(loc => {
            // Get open hours from openHoursMap using alternative name or main name
            const alternativeName = loc.alternative_names && loc.alternative_names.length > 0 ? loc.alternative_names[0] : null;
            const open_hours = (alternativeName && openHoursMap[alternativeName]) || openHoursMap[loc.name] || null;
            return {
              name: loc.name,
              city: loc.address.city,
              address: loc.address.address,
              phone_numbers: loc.phone_numbers.map(p => p.phone_number),
              external_id: loc.external_id,
              open_hours
            };
          });

          Context.setVariable("locations_information", extractedLocations)
        name: extract locations informations2
      type: function
      position:
        x: 548.7747975080555
        y: -157.00991794879715
