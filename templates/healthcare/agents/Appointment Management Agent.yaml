    - id: CgeYc7CjjBap_WILHEs6L
      data:
        code: |-
          Context.setVariable("workflow_status", "success")

          const appointmentListJson = Context.getVariable("upcoming_appointment_list")

          // 1. Filter the list first to only include specific service_type_ids
          const filteredAppointments = appointmentListJson.future_appointments.filter(appt => {
              const serviceId = String(appt.service_type_id); // Ensure string comparison
              return serviceId === "2721" || serviceId === "11700";
          });

          // 2. Map the filtered results to the desired format
          const finalAppointmentList = filteredAppointments.map(appt => {
              const {
                  date_time, timezone, has_service_type_id, comment, cancelled, cancellable, address, patient_instructions,
                  ...keepFields
              } = appt;

              // Format date_time as "YYYY-MM-DD hh:mmAM/PM"
              let formattedDateTime = '';
              if (date_time) {
                  const dateObj = new Date(date_time);
                  const year = dateObj.getFullYear();
                  const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                  const day = dateObj.getDate().toString().padStart(2, '0');
                  let hour = dateObj.getHours();
                  const minute = dateObj.getMinutes().toString().padStart(2, '0');
                  const ampm = hour >= 12 ? 'PM' : 'AM';
                  hour = hour % 12 || 12;
                  const formattedHour = hour.toString().padStart(2, '0');
                  formattedDateTime = `${year}-${month}-${day} ${formattedHour}:${minute}${ampm}`;
              }

              return {
                  ...keepFields,
                  date_time: formattedDateTime
              };
          });

          // 3. Save the cleaned and filtered list back to the Context
          Context.setVariable("upcoming_appointment_list", finalAppointmentList);
        name: Filter fields
      type: function
      position:
        x: 124.5
        y: -433.671875
